<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GAPC - Demo US9 y US10</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;900&family=Baloo+2:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <div class="background-layer"></div>

    <main class="app-shell">
      <header class="top-bar">
        <div class="brand-block">
          <p class="kicker">GAPC</p>
          <h1>Control Visual de Reunion</h1>
        </div>
        <div class="meeting-block">
          <button id="newMeetingBtn" class="pill-btn action-new" type="button">
            <span class="btn-icon" aria-hidden="true">🔄</span>
            <span class="btn-label">Nueva Reunion</span>
          </button>
          <button id="resetDemoBtn" class="reset-btn action-reset" type="button">
            <span class="btn-icon" aria-hidden="true">↺</span>
            <span class="btn-label">Reset Demo</span>
          </button>
          <button
            id="ttsToggleBtn"
            class="audio-btn"
            type="button"
            aria-label="Voz activada"
            title="Voz activada"
          >
            <span class="audio-icon" aria-hidden="true">🔊</span>
          </button>
        </div>
      </header>

      <section class="layout-grid">
        <article class="members-panel card">
          <div class="section-title-row">
            <h2>Socios y Socias</h2>
          </div>

          <details class="member-admin">
            <summary>+ Gestionar Socios y Prestamos</summary>
            <form id="memberForm" class="member-form" enctype="multipart/form-data">
              <div class="member-form-row">
                <label for="memberMode">Modo</label>
                <select id="memberMode" name="mode">
                  <option value="new">Nuevo socio/a</option>
                  <option value="existing">Socio/a existente</option>
                </select>
              </div>

              <div class="member-form-row">
                <label for="memberGenderSelect">Genero</label>
                <select id="memberGenderSelect" name="gender">
                  <option value="female">Socia</option>
                  <option value="male">Socio</option>
                </select>
              </div>

              <div id="existingMemberWrap" class="member-form-row hidden">
                <label for="existingMemberSelect">Socio/a</label>
                <select id="existingMemberSelect" name="member_id"></select>
              </div>

              <div class="member-form-row">
                <label for="memberNameInput">Nombre</label>
                <div class="name-input-with-voice">
                  <input id="memberNameInput" name="name" type="text" maxlength="40" />
                  <button
                    id="nameVoiceBtn"
                    class="name-voice-btn"
                    type="button"
                    aria-label="Dictar nombre"
                    title="Dictar nombre"
                  >
                    🎤
                  </button>
                </div>
              </div>

              <div class="member-form-row two-cols">
                <div>
                  <label for="principalTotalInput">Prestamo</label>
                  <input
                    id="principalTotalInput"
                    name="principal_total"
                    type="number"
                    min="0"
                    step="0.01"
                    required
                  />
                  <div class="loan-picker-block">
                    <div id="adminPrincipalTokens" class="admin-token-rack" data-target="principal"></div>
                    <button
                      id="clearPrincipalBtn"
                      class="mini-clear-btn"
                      type="button"
                      data-target="principal"
                    >
                      Limpiar prestamo
                    </button>
                  </div>
                </div>
                <div>
                  <label for="interestTotalInput">Interes</label>
                  <input
                    id="interestTotalInput"
                    name="interest_total"
                    type="number"
                    min="0"
                    step="0.01"
                    required
                  />
                  <div class="loan-picker-block">
                    <div id="adminInterestTokens" class="admin-token-rack" data-target="interest"></div>
                    <button
                      id="clearInterestBtn"
                      class="mini-clear-btn"
                      type="button"
                      data-target="interest"
                    >
                      Limpiar interes
                    </button>
                  </div>
                </div>
              </div>

              <div class="member-form-row">
                <label for="memberPhotoInput">Foto</label>
                <input id="memberPhotoInput" name="photo" type="file" accept="image/*" />
              </div>

              <button type="submit" class="member-save-btn">Guardar Socio/a y Prestamo</button>
            </form>
          </details>

          <div id="memberGrid" class="member-grid"></div>
        </article>

        <article class="payment-panel card">
          <div class="section-title-row">
            <h2>Pago de Prestamo</h2>
          </div>

          <div id="selectedMemberInfo" class="selected-member empty">
            Seleccione una socia
          </div>

          <div class="wallet-row">
            <button id="jarPrincipalBtn" class="jar-toggle active" data-target="principal">
              Alcancia Grande
            </button>
            <button id="jarInterestBtn" class="jar-toggle" data-target="interest">
              Alcancia Pequena
            </button>
          </div>

          <div class="jar-grid">
            <div id="jarPrincipal" class="jar jar-principal" data-target="principal">
              <p class="jar-icon">🏺</p>
              <p class="jar-name">Principal</p>
              <p id="principalAmount" class="jar-amount">$0.00</p>
              <p id="principalRemaining" class="jar-remaining"></p>
            </div>
            <div id="jarInterest" class="jar jar-interest" data-target="interest">
              <p class="jar-icon">🫙</p>
              <p class="jar-name">Interes</p>
              <p id="interestAmount" class="jar-amount">$0.00</p>
              <p id="interestRemaining" class="jar-remaining"></p>
            </div>
          </div>

          <div class="token-zone">
            <p class="token-label">Fichas de monto</p>
            <div id="tokenRack" class="token-rack"></div>
          </div>

          <div class="action-row">
            <button id="resetDraftBtn" class="danger-btn">X Borrar</button>
            <button id="savePaymentBtn" class="confirm-btn">Guardar Pago</button>
          </div>
          <p id="statusMsg" class="status-msg" aria-live="polite"></p>
        </article>
      </section>
    </main>

    <script id="initialState" type="application/json">
      {{ state | tojson }}
    </script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
